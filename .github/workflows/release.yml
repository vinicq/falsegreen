name: release

# Builds the package and publishes it to PyPI via Trusted Publishing (OIDC).
# No API token: the publish job exchanges a short-lived OIDC identity with PyPI.
# Fires on a GitHub release being published, or manually for an existing tag.
#
# One-time human setup before the first run (see RELEASE.md / the issue):
#   1. PyPI: add a Trusted Publisher for project `falsegreen`
#      (owner vinicq, repo falsegreen, workflow release.yml, environment pypi).
#   2. GitHub: create an environment named `pypi` (optionally tag-only + reviewer).

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    # Fail the release before publishing if the tag, the manifest, __version__, CITATION,
    # and the CHANGELOG disagree. Real drift happened (a manifest left behind its tag), and
    # an OIDC publish of a mismatched version is unrecoverable (#95).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Version parity (tag == pyproject == __version__ == CITATION == CHANGELOG)
        run: |
          tag="${GITHUB_REF_NAME#v}"
          manifest=$(grep -m1 '^version = ' pyproject.toml | sed -E 's/.*"([^"]+)".*/\1/')
          dunder=$(grep -m1 '__version__' src/falsegreen/scanner.py | sed -E 's/.*"([^"]+)".*/\1/')
          cff=$(grep -m1 '^version:' CITATION.cff | sed -E 's/^version:[[:space:]]*//')
          fail=0
          for pair in "pyproject:$manifest" "__version__:$dunder" "CITATION:$cff"; do
            name="${pair%%:*}"; val="${pair#*:}"
            if [ "$tag" != "$val" ]; then echo "::error::tag ${GITHUB_REF_NAME} != ${name} ${val}"; fail=1; fi
          done
          if ! grep -q "^## \[${manifest}\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no version section for ${manifest}"; fail=1
          fi
          if [ "$fail" = 0 ]; then echo "version parity OK: ${manifest}"; fi
          exit $fail

  build:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.13"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*
      - name: Upload dist artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # OIDC: the only credential the publish step needs
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        # Docker action: its ghcr.io image is tagged by release, not commit SHA,
        # so a SHA pin fails to pull. release/v1 is the maintained, recommended ref.
        uses: pypa/gh-action-pypi-publish@release/v1
