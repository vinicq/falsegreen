name: credential-reminder

# Quarterly reminder to re-verify the PyPI publish credential (#96), for parity with
# the npm-token reminders in -js/-skill. The release uses PyPI Trusted Publishing
# (OIDC), which has no token to expire, so this never fails: it emits a notice to
# re-check that the Trusted Publisher (project falsegreen, this repo + release.yml +
# the `pypi` environment) is still configured and that the environment protection
# rules are intact. If PyPI ever changes the OIDC contract, this is the standing nudge.

on:
  schedule:
    - cron: "0 9 1 1,4,7,10 *"   # 09:00 UTC on the 1st of Jan/Apr/Jul/Oct
  workflow_dispatch:

permissions:
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Re-verify the PyPI Trusted Publisher
        run: |
          echo "::notice::Quarterly check: confirm the PyPI Trusted Publisher for 'falsegreen' (repo + release.yml + 'pypi' environment) is still configured at https://pypi.org/manage/project/falsegreen/settings/publishing/ and the GitHub 'pypi' environment protection is intact. OIDC has no token expiry; this is a config-review nudge."
